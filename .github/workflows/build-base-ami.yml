name: Build Runner Base AMI

on:
  push:
    branches:
      - main
    paths:
      - "packer/runner-base-*.pkr.hcl"
      - "packer/provision-base.sh"
      - ".github/workflows/build-base-ami.yml"
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      use_fallback_runners:
        description: "Use GitHub-hosted runners (when self-hosted fleet is unavailable). Required to bootstrap when no working runs-fleet AMI exists yet."
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-base-ami-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-1

jobs:
  build:
    name: Build Base AMI ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            packer_file: runner-base-arm64.pkr.hcl
            runner: ${{ inputs.use_fallback_runners && 'ubuntu-24.04-arm' || format('runs-fleet={0}/cpu=4/arch=arm64', github.run_id) }}
          - arch: amd64
            packer_file: runner-base-amd64.pkr.hcl
            runner: ${{ inputs.use_fallback_runners && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4/arch=amd64', github.run_id) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Install Session Manager Plugin
        if: ${{ !inputs.use_fallback_runners }}
        run: |
          ARCH=$([ "$(uname -m)" = "x86_64" ] && echo linux_64bit || echo linux_arm64)
          sudo dnf install -y "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/${ARCH}/session-manager-plugin.rpm"

      - name: Materialize downstream provision hook (if configured)
        working-directory: packer
        env:
          PROVISION_BASE_HOOK: ${{ secrets.PROVISION_BASE_HOOK }}
        run: |
          if [ -n "$PROVISION_BASE_HOOK" ]; then
            printf '%s' "$PROVISION_BASE_HOOK" > provision-base-hook.sh
            echo "Materialized provision-base-hook.sh from secret ($(wc -l < provision-base-hook.sh) lines)"
          else
            echo "No PROVISION_BASE_HOOK secret set; using checked-in empty stub"
          fi

      - name: Packer Init
        working-directory: packer
        run: packer init ${{ matrix.packer_file }}

      - name: Packer Validate
        working-directory: packer
        env:
          # Downstream forks set vars.AMI_EXTRA_TAGS to a JSON-object string
          # (e.g., '{"Environment":"prod"}') to merge tags onto the final AMI.
          # Unset → '{}', which parses as an empty map(string).
          PKR_VAR_extra_tags: ${{ vars.AMI_EXTRA_TAGS || '{}' }}
        run: |
          packer validate \
            -var "vpc_id=${{ secrets.PACKER_VPC_ID }}" \
            ${{ matrix.packer_file }}

      - name: Packer Build
        id: packer
        working-directory: packer
        env:
          PKR_VAR_extra_tags: ${{ vars.AMI_EXTRA_TAGS || '{}' }}
        run: |
          packer build \
            -var "vpc_id=${{ secrets.PACKER_VPC_ID }}" \
            -machine-readable \
            ${{ matrix.packer_file }} | tee packer-output.txt

          AMI_ID=$(grep 'artifact,0,id' packer-output.txt | cut -d: -f2)
          if [ -z "$AMI_ID" ]; then
            echo "ERROR: Packer build did not produce an AMI" >&2
            exit 1
          fi
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "Built base AMI: $AMI_ID"
