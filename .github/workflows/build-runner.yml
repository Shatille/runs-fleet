name: Build Runner Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "docker/runner/**"
      - "cmd/agent/**"
      # The agent binary is compiled into this image, so any package it can
      # depend on must rebuild it (a fix in e.g. pkg/secrets must reach :latest,
      # else a stale agent is baked into the next AMI). Broad on purpose —
      # over-rebuilding is safe; hand-maintaining the agent's import list is not.
      - "pkg/**"
      - "go.mod"
      - "go.sum"
      - ".trivy/**"
      - ".github/workflows/build-runner.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: latest)"
        required: false
        default: "latest"
      use_fallback_runners:
        description: "Use GitHub-hosted arm64 fallback (when self-hosted fleet is unavailable)"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      tag:
        description: "Image tag"
        required: false
        type: string
        default: "latest"
      use_fallback_runners:
        description: "Use GitHub-hosted arm64 fallback"
        required: false
        type: boolean
        default: false
    secrets:
      AWS_IAM_ROLE_ARN:
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-runner-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-1
  RUNNER_BASE_TAG: ${{ vars.RUNNER_BASE_TAG || '2.334.0' }}

jobs:
  # Check if runner-related files changed since last tag
  check-changes:
    name: Check Runner Changes
    runs-on: ${{ inputs.use_fallback_runners && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for runner file changes
        id: check
        run: |
          # Always build on workflow_dispatch or workflow_call
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Non-push trigger, will build"
            exit 0
          fi

          # Find previous tag
          PREV_TAG=$(git tag -l 'v*.*.*' --sort=-v:refname | sed -n '2p')
          if [[ -z "$PREV_TAG" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "No previous tag found, will build"
            exit 0
          fi

          echo "Comparing $PREV_TAG to ${{ github.ref_name }}"

          # Check if runner-related files changed
          CHANGED=$(git diff --name-only "$PREV_TAG" "${{ github.ref_name }}" -- \
            'docker/runner/**' \
            'cmd/agent/**' \
            'pkg/**' \
            'go.mod' \
            'go.sum' \
            | head -1)

          if [[ -n "$CHANGED" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Runner files changed, will build"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "No runner file changes, skipping build"
          fi

  # Determine version once, share across jobs
  prepare:
    name: Prepare Build
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ${{ inputs.use_fallback_runners && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          elif [ -n "${{ inputs.tag }}" ] && [ "${{ inputs.tag }}" != "latest" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  # Gate the image publish on the agent's own tests. The agent binary baked into
  # this image is what runs on every EC2 runner; a regression in its init/auth
  # path (e.g. the Vault AWS-IAM regional-STS signing) must fail here so :latest
  # is never published. build-amis cascades only on a *successful* image build,
  # so a failure here means no new AMI can extract the broken agent (fail-closed).
  test:
    name: Test Agent
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ${{ inputs.use_fallback_runners && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # The agent binary's complete first-party dependency set (go list -deps
      # ./cmd/agent): none import pkg/admin, so this needs no admin-UI embed,
      # unlike the full `make test`. Includes the regional-STS signing test.
      - name: Test agent packages
        run: go test ./cmd/agent/... ./pkg/agent/... ./pkg/secrets/... ./internal/validation/...

  # Build on native runners (no QEMU)
  build:
    name: Build ${{ matrix.arch }}
    needs: [prepare, test]
    runs-on: ${{ matrix.runner }}
    env:
      # Read from secrets so deployments that treat the repository path as
      # non-public config can keep it out of plaintext variables. Job-level
      # because workflow-level `env:` cannot reference `secrets.*`.
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_RUNNER || 'runs-fleet-runner' }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ${{ inputs.use_fallback_runners && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4/arch=amd64', github.run_id) }}
            platform: linux/amd64
          - arch: arm64
            runner: ${{ inputs.use_fallback_runners && 'ubuntu-24.04-arm' || format('runs-fleet={0}/cpu=4/arch=arm64', github.run_id) }}
            platform: linux/arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push arch-specific image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/runner/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          pull: true
          tags: ${{ needs.prepare.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            RUNNER_BASE_TAG=${{ env.RUNNER_BASE_TAG }}
          cache-from: type=registry,ref=${{ needs.prepare.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ needs.prepare.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache-${{ matrix.arch }},mode=max,image-manifest=true
          sbom: true
          provenance: mode=max
          no-cache-filters: stage-1

  # Create multi-arch manifest
  manifest:
    name: Create Multi-arch Manifest
    needs: [prepare, build]
    runs-on: ${{ inputs.use_fallback_runners && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    env:
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_RUNNER || 'runs-fleet-runner' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push multi-arch manifest
        run: |
          REGISTRY="${{ needs.prepare.outputs.registry }}"
          REPO="${{ env.ECR_REPOSITORY }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          docker buildx imagetools create \
            -t "${REGISTRY}/${REPO}:${VERSION}-unverified" \
            "${REGISTRY}/${REPO}:${VERSION}-amd64" \
            "${REGISTRY}/${REPO}:${VERSION}-arm64"

  # Scan and promote
  verify:
    name: Scan and Promote
    needs: [prepare, manifest]
    runs-on: ${{ inputs.use_fallback_runners && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    env:
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_RUNNER || 'runs-fleet-runner' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull image and save to tarball
        env:
          IMAGE_REF: "${{ needs.prepare.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.prepare.outputs.version }}-unverified"
        run: |
          docker pull "${IMAGE_REF}"
          docker save "${IMAGE_REF}" -o runner-image.tar

      - name: Scan image for vulnerabilities
        id: scan
        run: |
          docker run --rm \
            -v "${PWD}:/work:ro" \
            -v "${PWD}/.trivy:/trivy:ro" \
            aquasec/trivy:0.70.0 image \
              --config /trivy/trivy.yaml \
              --vex /trivy/vex.json \
              --ignore-unfixed \
              --exit-code 1 \
              --no-progress \
              --input /work/runner-image.tar

      - name: Delete images on scan failure
        if: failure() && steps.scan.outcome == 'failure'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "Vulnerability scan failed. Deleting images..."
          aws ecr batch-delete-image \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag="${VERSION}-unverified" imageTag="${VERSION}-amd64" imageTag="${VERSION}-arm64" \
            || true

      - name: Promote to final tags
        if: success()
        run: |
          set -e
          REPO="${{ env.ECR_REPOSITORY }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          echo "Promoting ${VERSION}-unverified to ${VERSION}..."

          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "$REPO" \
            --image-ids imageTag="${VERSION}-unverified" \
            --query 'images[0].imageManifest' \
            --output text)

          if [[ -z "$MANIFEST" || "$MANIFEST" == "None" ]]; then
            echo "ERROR: Failed to retrieve manifest"
            exit 1
          fi

          if ! OUTPUT=$(aws ecr put-image \
            --repository-name "$REPO" \
            --image-tag "$VERSION" \
            --image-manifest "$MANIFEST" 2>&1); then
            if echo "$OUTPUT" | grep -q "ImageAlreadyExistsException"; then
              echo "Image already tagged as ${VERSION}, skipping"
            else
              echo "$OUTPUT" >&2
              exit 1
            fi
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "Tagging as latest..."
            if ! OUTPUT=$(aws ecr put-image \
              --repository-name "$REPO" \
              --image-tag "latest" \
              --image-manifest "$MANIFEST" 2>&1); then
              if echo "$OUTPUT" | grep -q "ImageAlreadyExistsException"; then
                echo "Image already tagged as latest, skipping"
              else
                echo "$OUTPUT" >&2
                exit 1
              fi
            fi
          fi

          # Cleanup staging tags
          aws ecr batch-delete-image \
            --repository-name "$REPO" \
            --image-ids imageTag="${VERSION}-unverified" imageTag="${VERSION}-amd64" imageTag="${VERSION}-arm64" \
            || true

          echo "Image promoted successfully"
