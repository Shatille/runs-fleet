name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      use_fallback_runners:
        description: "Use GitHub-hosted runners (when self-hosted fleet is unavailable)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      pins: ${{ steps.filter.outputs.pins }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'pkg/admin/ui/**'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            pins:
              - 'packer/provision-base.sh'
              - 'docker/runner/Dockerfile'
              - '.github/scripts/check-pin-sync.sh'
              - '.github/workflows/ci.yml'

  pin-sync:
    name: Pin Sync
    needs: changes
    if: needs.changes.outputs.pins == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Assert provision-base.sh pins match Dockerfile ARGs
        run: bash .github/scripts/check-pin-sync.sh

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ${{ (inputs.use_fallback_runners || github.repository == 'Shatille/runs-fleet' || github.event.repository.visibility == 'public') && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pkg/admin/ui/package-lock.json

      - name: Build admin UI
        run: make build-admin-ui

      - name: Upload UI artifact
        uses: actions/upload-artifact@v6
        with:
          name: admin-ui
          path: pkg/admin/ui/out
          retention-days: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}-${{ runner.arch }}-

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  lint:
    name: Lint
    needs: [changes, build]
    if: needs.changes.outputs.go == 'true'
    runs-on: ${{ (inputs.use_fallback_runners || github.repository == 'Shatille/runs-fleet' || github.event.repository.visibility == 'public') && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    steps:
      - uses: actions/checkout@v5

      - name: Download UI artifact
        uses: actions/download-artifact@v7
        with:
          name: admin-ui
          path: pkg/admin/ui/out

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore Go build cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache tools
        uses: actions/cache@v5
        with:
          path: bin
          key: go-tools-${{ runner.os }}-${{ runner.arch }}-golangci-v2.7.2

      - name: Install golangci-lint
        run: |
          mkdir -p bin
          test -f ./bin/golangci-lint || curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b ./bin v2.7.2

      - name: Lint
        run: |
          export PATH="./bin:$PATH"
          make lint

  test:
    name: Test
    needs: [changes, build]
    if: needs.changes.outputs.go == 'true'
    runs-on: ${{ (inputs.use_fallback_runners || github.repository == 'Shatille/runs-fleet' || github.event.repository.visibility == 'public') && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    steps:
      - uses: actions/checkout@v5

      - name: Download UI artifact
        uses: actions/download-artifact@v7
        with:
          name: admin-ui
          path: pkg/admin/ui/out

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore Go build cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}-${{ runner.arch }}-

      - name: Test
        run: make test
