name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "cmd/server/**"
      - "pkg/**"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        type: choice
        options: [patch, minor]
        default: patch
      custom_version:
        description: "Custom version (e.g., v1.2.0). Overrides bump type."
        type: string
      use_fallback_runners:
        description: "Use GitHub-hosted arm64 fallback (when self-hosted fleet is unavailable)"
        type: boolean
        default: false

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  # Forks that classify these values as sensitive set them via `secrets.X`
  # instead of repo variables; fall back through both so either form works.
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || vars.ECR_REPOSITORY || 'runs-fleet' }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER || vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE || vars.ECS_SERVICE || 'runs-fleet-server' }}

jobs:
  version:
    name: Calculate Version
    runs-on: ${{ (inputs.use_fallback_runners || github.repository == 'Shatille/runs-fleet' || github.event.repository.visibility == 'public') && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    outputs:
      version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Calculate version
        id: version
        run: |
          validate_version() {
            if ! [[ $1 =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version format '$1'"
              exit 1
            fi
          }

          CUSTOM="${{ inputs.custom_version }}"
          if [ -n "$CUSTOM" ]; then
            validate_version "$CUSTOM"
            [[ $CUSTOM =~ ^v ]] || CUSTOM="v${CUSTOM}"
            NEW_VERSION="$CUSTOM"
          else
            LATEST=$(aws ecr describe-images --repository-name $ECR_REPOSITORY \
              --query 'imageDetails[*].imageTags[]' --output text 2>/dev/null | \
              tr '\t' '\n' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)

            VERSION=${LATEST#v}
            if [ -z "$VERSION" ]; then
              VERSION="0.0.0"
            fi
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)

            BUMP="${{ inputs.bump || 'patch' }}"
            if [ "$BUMP" = "minor" ]; then
              NEW_VERSION="v${MAJOR}.$((MINOR + 1)).0"
            else
              NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi

          if aws ecr describe-images --repository-name $ECR_REPOSITORY \
            --image-ids imageTag=$NEW_VERSION >/dev/null 2>&1; then
            echo "Version $NEW_VERSION already exists"
            exit 1
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $NEW_VERSION"

  build:
    name: Build ${{ matrix.arch }}
    needs: version
    runs-on: "${{ matrix.runner }}"
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ${{ (inputs.use_fallback_runners || github.repository == 'Shatille/runs-fleet' || github.event.repository.visibility == 'public') && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4/arch=amd64', github.run_id) }}
            platform: linux/amd64
          - arch: arm64
            runner: ${{ (inputs.use_fallback_runners || github.repository == 'Shatille/runs-fleet' || github.event.repository.visibility == 'public') && 'ubuntu-24.04-arm' || format('runs-fleet={0}/cpu=4/arch=arm64', github.run_id) }}
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          pull: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.version.outputs.version }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          cache-from: type=registry,ref=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache-${{ matrix.arch }},mode=max,image-manifest=true
          sbom: true
          provenance: mode=max
          no-cache-filters: stage-1

  manifest:
    name: Create Manifest
    needs: [version, build]
    runs-on: ${{ (inputs.use_fallback_runners || github.repository == 'Shatille/runs-fleet' || github.event.repository.visibility == 'public') && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-buildx-action@v4

      - name: Create and push multi-arch manifest
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION-amd64 \
            $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION-arm64

  coverage:
    name: Update Coverage
    if: github.repository == 'Shatille/runs-fleet'
    runs-on: ${{ (inputs.use_fallback_runners || github.repository == 'Shatille/runs-fleet' || github.event.repository.visibility == 'public') && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pkg/admin/ui/package-lock.json

      - name: Build admin UI
        run: make build-admin-ui

      - name: Restore Go build cache from CI
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}-${{ runner.arch }}-

      - run: make coverage

      - id: coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | sed 's/%//')
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT

      - uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 089a4c604db357e35ee33f10be5a1bbf
          filename: runs-fleet-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          minColorRange: 50
          maxColorRange: 90

  deploy:
    name: Deploy to ECS
    if: github.repository == 'Shatille/runs-fleet'
    needs: [version, manifest]
    runs-on: ${{ (inputs.use_fallback_runners || github.repository == 'Shatille/runs-fleet' || github.event.repository.visibility == 'public') && 'ubuntu-latest' || format('runs-fleet={0}/cpu=4', github.run_id) }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Deploy to ECS
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $ECS_SERVICE \
            --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$ECR_REGISTRY/$ECR_REPOSITORY:$VERSION" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered $NEW_TASK_ARN"

          DEPLOY_ID=$(aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition "$NEW_TASK_ARN" \
            --query 'service.deployments[?status==`PRIMARY`].id | [0]' \
            --output text)
          echo "Created deployment $DEPLOY_ID"

          # Poll the deployment we just created until it reaches a terminal state.
          # ECS removes failed deployments from the list once the circuit-breaker
          # rollback completes, so a missing rolloutState also means failure.
          for i in $(seq 1 60); do
            STATE=$(aws ecs describe-services \
              --cluster $ECS_CLUSTER --services $ECS_SERVICE \
              --query "services[0].deployments[?id=='${DEPLOY_ID}'].rolloutState | [0]" \
              --output text)

            case "$STATE" in
              COMPLETED)
                echo "Deployment $DEPLOY_ID completed."
                exit 0
                ;;
              FAILED|None|"")
                echo "::error::Deployment $DEPLOY_ID failed (state=$STATE). ECS most likely rolled back via circuit breaker; recent events:"
                aws ecs describe-services \
                  --cluster $ECS_CLUSTER --services $ECS_SERVICE \
                  --query 'services[0].events[:15].[createdAt,message]' \
                  --output table
                exit 1
                ;;
              IN_PROGRESS)
                echo "  [$i/60] rolloutState=IN_PROGRESS"
                ;;
              *)
                echo "  [$i/60] rolloutState=$STATE"
                ;;
            esac
            sleep 15
          done

          echo "::error::Timed out after 15 minutes waiting for deployment $DEPLOY_ID."
          exit 1

      - name: Summary
        env:
          VERSION: ${{ needs.version.outputs.version }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          echo "### Deployed $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`$ECR_REGISTRY/$ECR_REPOSITORY:$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- Platforms: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
