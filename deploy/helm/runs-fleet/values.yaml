# runs-fleet Helm chart values

# Common labels applied to all Helm-managed resources (Deployment, Service, RBAC, etc.)
commonLabels: {}
# Example:
#   team: platform
#   environment: production

# AWS configuration (required)
aws:
  region: ap-northeast-1

  # Orchestrator's own externally-reachable HTTPS endpoint, served to runners as
  # ACTIONS_CACHE_URL for the S3-backed Actions cache. Required. Set per-deployment
  # (kept empty here to avoid hardcoding an environment-specific host in-chart).
  baseUrl: ""

  # Network
  vpcId: ""
  subnetIds: []
  securityGroupId: ""
  instanceProfileArn: ""

  # SQS queues
  queueUrl: ""
  queueDlqUrl: ""
  poolQueueUrl: ""
  eventsQueueUrl: ""
  terminationQueueUrl: ""

  # DynamoDB tables
  jobsTable: "runs-fleet-jobs"
  poolsTable: "runs-fleet-pools"
  circuitBreakerTable: "runs-fleet-circuit-state"
  # Standard names of the jobs-table GSIs — part of the runs-fleet schema, not
  # per-deployment settings. The orchestrator queries these instead of a
  # full-table Scan: instance-id for GetJobByInstance (spot-interruption +
  # bootstrap_failed), pool-status for GetPoolBusyInstanceIDs (per-pool
  # reconcile). Override to "" for a deployment that hasn't provisioned an index.
  jobsInstanceIdGsi: "instance-id-index"
  jobsPoolStatusGsi: "pool-status-index"

  # S3 buckets
  cacheBucket: ""
  configBucket: ""

  # EC2 runner settings
  runnerImage: ""
  launchTemplateName: "runs-fleet-runner"
  spotEnabled: true
  maxRuntimeMinutes: 360
  keyName: ""

  # Custom tags for EC2 resources (cost allocation, ownership, etc.)
  # AWS recommends PascalCase for Cost Allocation Tags
  tags: {}
  # Example:
  #   Team: platform
  #   Project: ci-runners
  #   CostCenter: engineering

  # Cost-attribution tag key/value overrides. Every runner instance always
  # gets one "application" tag and one "service" tag (defaults:
  # Application=runs-fleet, Service=runner); a fork with a different tag
  # policy can remap the key name, the value, or both independently.
  tagKeyApplication: "" # RUNS_FLEET_TAG_KEY_APPLICATION, default: Application
  tagValueApplication: "" # RUNS_FLEET_TAG_VALUE_APPLICATION, default: runs-fleet
  tagKeyService: "" # RUNS_FLEET_TAG_KEY_SERVICE, default: Service
  tagValueService: "" # RUNS_FLEET_TAG_VALUE_SERVICE, default: runner

# Orchestrator configuration
orchestrator:
  image:
    repository: runs-fleet
    tag: latest
    pullPolicy: Always

  replicas: 2

  # Seconds the orchestrator keeps serving HTTP after SIGTERM (readiness already
  # 503) before closing the listener, so the endpoints controller deregisters
  # this pod before it stops accepting webhooks. Maps to
  # RUNS_FLEET_SHUTDOWN_DRAIN_DELAY_SECONDS; 0 disables. Must leave room under
  # terminationGracePeriodSeconds for the worker/telemetry drain below.
  shutdownDrainDelaySeconds: 5

  # Grace period for draining on SIGTERM. The orchestrator fails readiness, holds
  # the listener open for shutdownDrainDelaySeconds, then stops accepting new
  # work and lets in-flight message processing run to completion (bounded by the
  # ~90s MessageProcessTimeout); this must exceed the drain delay plus the
  # internal worker drain timeout (MessageProcessTimeout + 10s) plus the
  # HTTP/telemetry shutdown steps, or k8s SIGKILLs the pod mid-drain and
  # reintroduces the rollout error burst. Tradeoff: each old pod can take up to
  # this long to leave during a rollout, though typical drains finish in seconds.
  terminationGracePeriodSeconds: 120

  # Deployment annotations (ArgoCD, Flux, etc.)
  annotations: {}

  # Pod annotations (Prometheus, Vault, Datadog, etc.)
  podAnnotations: {}

  serviceAccount:
    # Set to false to use an existing ServiceAccount
    create: true
    # Override the generated name, or specify existing SA name when create=false
    name: ""
    annotations: {}
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/runs-fleet

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # Pod security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534

  # Container security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  nodeSelector:
    kubernetes.io/os: linux

  tolerations: []

  affinity: {}

# GitHub App configuration
github:
  appId: "" # Required: GitHub App ID (ignored if existingSecret is set)
  privateKey: "" # Required: GitHub App private key (ignored if existingSecret is set)
  webhookSecret: "" # Required: Webhook secret (ignored if existingSecret is set)
  existingSecret: "" # Use existing secret instead of creating one (e.g., from VaultSecretMap)

# Admin API/UI configuration (native OIDC authorization-code + PKCE flow).
# Leaving oidc.issuerUrl/clientId/clientSecret and sessionSecret all empty
# disables admin auth entirely -- the admin API/UI is still served on the
# same port as everything else, just unauthenticated (local-dev ergonomic).
# Setting auth up requires all of oidc.issuerUrl, oidc.clientId,
# oidc.clientSecret (or existingSecret), and sessionSecret (or
# existingSecret) -- validated at orchestrator startup, fail-fast on a
# partial config.
admin:
  rateLimit: 60 # requests/min per IP across /api/* (RUNS_FLEET_ADMIN_RATE_LIMIT)

  # Audit log persistence (RUNS_FLEET_AUDIT_TABLE). Empty = admin actions
  # are still logged via slog but not persisted/queryable through
  # GET /api/audit-logs.
  auditTable: ""

  oidc:
    issuerUrl: "" # e.g. https://idp.example.com/realms/example
    clientId: ""
    # Client secret: set directly, or prefer existingSecret (below) so it
    # isn't stored in a values file / GitOps manifest in plaintext.
    clientSecret: ""
    # Overrides the callback URL; defaults to {aws.baseUrl}/api/auth/callback.
    redirectUrl: ""
    scopes: "openid,profile,email"
    # Keycloak/Okta use "groups"; Auth0 commonly namespaces it; Google has none.
    groupsClaim: "groups"

  # Session cookie signing secret (RUNS_FLEET_ADMIN_SESSION_SECRET) and TTL.
  # Required (with the oidc.* fields above) once OIDC auth is configured.
  sessionSecret: ""
  sessionTtlMinutes: 480

  # Use an existing Secret (e.g. from a VaultSecretMap) instead of setting
  # oidc.clientSecret/sessionSecret directly above. Must provide the keys
  # RUNS_FLEET_ADMIN_OIDC_CLIENT_SECRET and RUNS_FLEET_ADMIN_SESSION_SECRET.
  # Independent of github.existingSecret above -- setting one doesn't
  # require setting the other; each gates its own Secret object.
  existingSecret: ""

# Custom runner-label aliases (sets RUNS_FLEET_LABEL_ALIASES).
# JSON array of rules mapping externally-defined runs-on labels (e.g. labels
# inherited from another runner system you are migrating off) to runs-fleet
# specs, so jobs keep their existing runs-on and runs-fleet serves them without
# workflow changes. Empty = disabled. See docs/CONFIGURATION.md.
# Example: '[{"match":"^ci-(\\d+)x-(amd64|arm64)$","regex":true,"spec":"cpu=${1}+${1}/arch=${2}"}]'
labelAliases: ""

# Secrets backend configuration
secrets:
  # Backend selection: "ssm" (default) or "vault"
  backend: ssm

  # SSM configuration (backend: ssm)
  ssm:
    prefix: "/runs-fleet/runners"

  # Vault configuration (backend: vault)
  vault:
    # Vault server address (required when backend: vault)
    address: ""
    # Vault namespace (enterprise feature, optional)
    namespace: ""
    # KV secrets engine mount path
    kvMount: "secret"
    # KV version (0 = auto-detect, 1 or 2)
    kvVersion: 0
    # Base path for secrets within KV mount
    basePath: "runs-fleet/runners"

    # Authentication method: "aws", "kubernetes", "jwt", "approle", or "token"
    authMethod: "aws"

    # AWS IAM auth configuration (authMethod: aws)
    aws:
      role: "runs-fleet"
      region: "" # Defaults to AWS_REGION if empty

    # Kubernetes/JWT auth configuration (authMethod: kubernetes, k8s, or jwt)
    kubernetes:
      authMount: "kubernetes" # Vault auth backend mount path
      role: "" # Required for kubernetes auth
      audience: "" # Token audience for JWT auth (creates projected volume if set)
      jwtPath: "" # Override JWT path (auto-set when audience is configured)
      tokenExpirationSeconds: 3600 # Projected token expiration (only used when audience is set)

    # AppRole auth configuration (authMethod: approle)
    appRole:
      roleId: "" # Required for approle auth
      secretId: "" # Required for approle auth (stored in secret)

    # Token auth configuration (authMethod: token)
    token: "" # Required for token auth (stored in secret)

# Ingress configuration
ingress:
  enabled: false
  className: nginx
  annotations: {}
  host: runs-fleet.example.com
  tls:
    enabled: false
    secretName: runs-fleet-tls

# Logging configuration
logging:
  level: info
  format: json

# Metrics configuration
# The metric name prefix is fixed and not configurable: CloudWatch="RunsFleet",
# Prometheus/Datadog="runs_fleet". A fixed prefix prevents metric-name
# collisions across deployments sharing a metrics backend.
metrics:
  # CloudWatch metrics (enabled by default)
  cloudwatch:
    enabled: true

  # Prometheus metrics endpoint
  prometheus:
    enabled: false
    path: "/metrics"

  # Datadog DogStatsD metrics
  datadog:
    enabled: false
    # When true, uses Downward API to get node IP for DogStatsD (required for hostPort DaemonSet)
    useHostIP: true
    # Port for DogStatsD when useHostIP is true (default: 8125)
    port: 8125
    # Static address (only used when useHostIP is false)
    address: "127.0.0.1:8125"
    tags: [] # Global tags, e.g., ["env:production", "service:runs-fleet"]
    # Autodiscovery log collection (requires Datadog Agent with log collection enabled)
    logs:
      enabled: false
      source: "runs-fleet"
      service: "" # Defaults to Release name if empty

# Istio service mesh configuration
istio:
  enabled: false

  # Sidecar injection (disabled by default, enable if mesh observability needed)
  sidecarInjection: false

  # Gateway for ingress traffic
  gateway:
    enabled: false
    host: runs-fleet.example.com
    # Selector to target Istio ingress gateway pods (user must provide)
    selector: {}
    # TLS mode: SIMPLE (terminate at gateway), PASSTHROUGH, or empty for HTTP
    tls:
      enabled: true
      mode: SIMPLE
      credentialName: runs-fleet-tls # Secret containing TLS cert

  # Certificate (requires cert-manager)
  certificate:
    enabled: false
    issuerRef:
      name: letsencrypt-prod
      kind: ClusterIssuer
    # secretName defaults to gateway.tls.credentialName

  # VirtualService for traffic management
  virtualService:
    enabled: false
    # If gateway.enabled, automatically uses the dedicated gateway
    # Otherwise, specify external gateways here
    gateways: []
    # - istio-system/default-gateway
    hosts: []
    # - runs-fleet.example.com (defaults to gateway.host if gateway enabled)

  # DestinationRule for traffic policies
  destinationRule:
    enabled: false
    trafficPolicy:
      connectionPool:
        http:
          h2UpgradePolicy: UPGRADE
          http1MaxPendingRequests: 100
          http2MaxRequests: 1000
      outlierDetection:
        consecutive5xxErrors: 5
        interval: 30s
        baseEjectionTime: 30s

