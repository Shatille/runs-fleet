# ServiceAccount for the orchestrator Deployment, bound to the AWS IAM
# role from ../../terraform/iam.tf via IRSA (IAM Roles for Service
# Accounts).
#
# Prereq: your EKS cluster has an OIDC provider, and the orchestrator
# IAM role's trust policy lets this ServiceAccount assume it. The role
# ARN goes in the annotation below.
#
# Alternative: if you use Pod Identity Agent instead of IRSA, drop the
# annotation and create a PodIdentityAssociation pointing at this SA.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: runs-fleet-orchestrator
  namespace: runs-fleet
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/runs-fleet-orchestrator
